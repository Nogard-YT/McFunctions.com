name: 🔄 Sync fork with upstream

on:
  schedule:
    - cron: "0 3 * * *" # daily at 3 AM UTC
  workflow_dispatch:     # manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "Nogard-YT"
          git config user.email "nogmcpe@gmail.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/misode/misode.github.io.git || true
          git fetch upstream

      - name: Merge upstream/master into fork/master
        run: |
          git checkout master
          set -e
          if git merge upstream/master --no-edit; then
            echo "✅ Merge successful"
          else
            echo "⚠️ Merge conflict detected, attempting auto-resolution..."

            # Auto-resolve conflicts in locale files by taking upstream
            # version and re-applying the McFunctions.com branding
            CONFLICTED=$(git diff --name-only --diff-filter=U)
            RESOLVED_ALL=true

            for file in $CONFLICTED; do
              if [[ "$file" == src/locales/*.json ]]; then
                echo "  Resolving $file by taking upstream + branding fix"
                git show upstream/master:"$file" > "$file"
                sed -i 's/misode\.github\.io/McFunctions.com/g' "$file"
                git add "$file"
              elif [[ "$file" == "package.json" || "$file" == "package-lock.json" ]]; then
                echo "  Resolving $file by taking upstream (fork does not customize dependencies)"
                git checkout --theirs -- "$file"
                git add "$file"
              else
                echo "  ❌ Cannot auto-resolve: $file"
                RESOLVED_ALL=false
              fi
            done

            if [ "$RESOLVED_ALL" = true ]; then
              git commit --no-edit
              echo "✅ All conflicts auto-resolved"
            else
              echo "❌ Some conflicts require manual resolution"
              git merge --abort
              exit 1
            fi
          fi

          git push origin master
